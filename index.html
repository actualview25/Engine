<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="Actual View Engine - Reality Navigation Platform">
    <title>Actual View Engine - منصة التصوير والتنقل الافتراضي</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    
    <!-- Styles -->
    <link rel="stylesheet" href="/src/ui/css/style.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome (اختياري للأيقونات) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- حاوية المشهد -->
        <div id="container"></div>
        
        <!-- شريط الحالة -->
        <div class="status-bar" id="statusBar">
            <div class="status-icon">🟢</div>
            <div class="status-text" id="statusMessage">المنصة جاهزة</div>
            <div class="status-time" id="statusTime"></div>
        </div>
        
        <!-- شاشة التحميل -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">جاري تحميل المنصة...</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
        </div>
        
        <!-- إشعارات -->
        <div class="notification-container" id="notificationContainer"></div>
        
        <!-- مؤشر التسجيل الصوتي -->
        <div class="voice-indicator" id="voiceIndicator" style="display: none;">
            <div class="voice-wave"></div>
            <div class="voice-text">جاري الاستماع...</div>
        </div>
    </div>
    
    <!-- Import Map -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    
    <!-- Scripts -->
    <script type="module" src="/src/main.js"></script>
</body>
</html>
