<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Actual View Engine - منصة التصوير والتنقل الافتراضي</title>
    
    <!-- Favicon (emoji بدلاً من ملف) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏗️</text></svg>">
    
    <!-- Styles مدمجة -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: #000;
            direction: rtl;
        }
        
        #container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        /* ========== STATUS BAR ========== */
        .status-bar {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 100;
            border: 1px solid rgba(255, 170, 68, 0.3);
            font-family: monospace;
            font-size: 12px;
            pointer-events: none;
        }
        
        .status-icon {
            font-size: 14px;
        }
        
        .status-text {
            flex: 1;
            color: #ffaa44;
        }
        
        .status-time {
            color: #888;
        }
        
        /* ========== LOADING OVERLAY ========== */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0a0a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.5s ease;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #2a2a3a;
            border-top-color: #ffaa44;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            margin-top: 15px;
            color: #ffaa44;
            font-size: 14px;
        }
        
        .loading-progress {
            width: 200px;
            height: 4px;
            background: #2a2a3a;
            border-radius: 4px;
            margin-top: 15px;
            overflow: hidden;
        }
        
        .loading-progress-bar {
            height: 100%;
            width: 0%;
            background: #ffaa44;
            transition: width 0.3s ease;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* ========== NOTIFICATION ========== */
        .notification-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        
        .notification {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            padding: 12px 16px;
            min-width: 250px;
            border-right: 3px solid #ffaa44;
            animation: slideIn 0.3s ease;
            pointer-events: auto;
            cursor: pointer;
        }
        
        .notification.success { border-right-color: #44ff44; }
        .notification.error { border-right-color: #ff4444; }
        .notification.warning { border-right-color: #ffaa44; }
        .notification.info { border-right-color: #44aaff; }
        
        .notification-title {
            font-weight: bold;
            margin-bottom: 4px;
            color: #fff;
        }
        
        .notification-message {
            font-size: 12px;
            color: #ccc;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        /* ========== VOICE INDICATOR ========== */
        .voice-indicator {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            border: 1px solid #ffaa44;
            display: none;
        }
        
        .voice-wave {
            width: 15px;
            height: 15px;
            background: #ffaa44;
            border-radius: 50%;
            animation: wave 0.5s infinite alternate;
        }
        
        .voice-text {
            color: #ffaa44;
            font-size: 14px;
        }
        
        @keyframes wave {
            from { transform: scale(0.5); opacity: 0.5; }
            to { transform: scale(1); opacity: 1; }
        }
        
        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .status-bar {
                bottom: 80px;
                font-size: 10px;
            }
            
            .notification {
                min-width: 200px;
                font-size: 12px;
            }
            
            .voice-indicator {
                bottom: 140px;
                padding: 8px 16px;
            }
        }
        
        /* ========== UTILITY ========== */
        .hidden {
            display: none !important;
        }
        
        .no-pointer {
            pointer-events: none !important;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- حاوية المشهد -->
        <div id="container"></div>
        
        <!-- شريط الحالة -->
        <div class="status-bar">
            <span class="status-icon">🟢</span>
            <span class="status-text" id="statusMessage">المنصة جاهزة</span>
            <span class="status-time" id="statusTime"></span>
        </div>
        
        <!-- شاشة التحميل -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">جاري تحميل المنصة...</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="loadingProgressBar"></div>
            </div>
        </div>
        
        <!-- إشعارات -->
        <div class="notification-container" id="notificationContainer"></div>
        
        <!-- مؤشر التسجيل الصوتي -->
        <div class="voice-indicator" id="voiceIndicator">
            <div class="voice-wave"></div>
            <div class="voice-text">جاري الاستماع...</div>
        </div>
    </div>
    
    <!-- Import Maps -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    
    <!-- Main Script -->
    <script type="module" src="/src/main.js"></script>
</body>
</html>
